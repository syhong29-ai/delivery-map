<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>맘스민 배송지도</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; }
    #map { width: 100%; height: 100vh; }
    #legend {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      background: white; border-radius: 8px; padding: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 13px;
      min-width: 140px;
    }
    #legend h4 { margin-bottom: 8px; font-size: 14px; font-weight: 600; }
    .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    #toggle-btns {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      display: flex; gap: 6px; flex-wrap: wrap; max-width: 60%;
    }
    .toggle-btn {
      background: white; border: 1.5px solid #ddd; border-radius: 99px;
      padding: 5px 14px; font-size: 12px; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-family: 'Noto Sans KR', sans-serif;
    }
    .toggle-btn:hover { opacity: 0.85; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 16px; color: #555; z-index: 20;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="loading">지도 불러오는 중...</div>
  <div id="toggle-btns"></div>
  <div id="legend">
    <h4>📍 범례</h4>
    <div id="driver-legend"></div>
    <div style="margin-top:8px; padding-top:8px; border-top:1px solid #eee;">
      <div class="legend-item">● 고정 거래처</div>
      <div class="legend-item">▲ 단발 거래처</div>
    </div>
  </div>

  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=y5jibtfitv&submodules=geocoder"></script>
  <script>
    const SHEET_ID = 'YOUR_SHEET_ID';
    const SHEET_NAME = '배송거래처';

    const DRIVER_COLORS = {};
    const COLOR_POOL = ['#2196F3','#F44336','#4CAF50','#FF9800','#9C27B0','#00BCD4','#FF5722','#607D8B'];
    let colorIdx = 0;

    function getColor(driver) {
      if (!driver) return '#888888';
      if (!DRIVER_COLORS[driver]) {
        DRIVER_COLORS[driver] = COLOR_POOL[colorIdx % COLOR_POOL.length];
        colorIdx++;
      }
      return DRIVER_COLORS[driver];
    }

    async function loadSheetData() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substr(47).slice(0, -2));
      const rows = json.table.rows;
      return rows.map(r => ({
        name    : r.c[0]?.v || '',
        address : r.c[1]?.v || '',
        phone   : r.c[2]?.v || '',
        memo    : r.c[3]?.v || '',
        driver  : r.c[4]?.v || '',
        type    : r.c[5]?.v || '고정'
      })).filter(r => r.name && r.address);
    }

    async function initMap() {
      const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(36.35, 127.385),
        zoom: 12
      });

      document.getElementById('loading').style.display = 'none';

      const data = await loadSheetData();
      const drivers = {};
      const allMarkers = [];

      for (const item of data) {
        await new Promise(resolve => {
          naver.maps.Service.geocode({ query: item.address }, function(status, response) {
            if (status !== naver.maps.Service.Status.OK || !response.v2.addresses.length) {
              resolve(); return;
            }
            const addr = response.v2.addresses[0];
            const position = new naver.maps.LatLng(addr.y, addr.x);
            const color = getColor(item.driver);
            const isSingle = item.type === '단발';

            const svg = isSingle
              ? `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"><polygon points="12,2 22,22 2,22" fill="${color}" stroke="white" stroke-width="1.5"/></svg>`
              : `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="${color}" stroke="white" stroke-width="2"/><text x="12" y="16" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">${item.driver ? item.driver[0] : ''}</text></svg>`;

            const marker = new naver.maps.Marker({
              position,
              map,
              icon: { content: `<div>${svg}</div>`, anchor: new naver.maps.Point(15, 15) }
            });

            const infowindow = new naver.maps.InfoWindow({
              content: `<div style="padding:10px;min-width:180px;font-size:13px;line-height:1.8;">
                <strong>${item.name}</strong><br>
                📍 ${item.address}<br>
                ${item.phone ? '📞 ' + item.phone + '<br>' : ''}
                ${item.memo ? '📝 ' + item.memo + '<br>' : ''}
                ${item.driver ? '🚗 ' + item.driver : ''}
                <span style="background:${color};color:white;font-size:11px;padding:1px 7px;border-radius:99px;">${item.type||'고정'}</span>
              </div>`
            });

            naver.maps.Event.addListener(marker, 'click', function() {
              infowindow.getMap() ? infowindow.close() : infowindow.open(map, marker);
            });

            if (!drivers[item.driver]) drivers[item.driver] = [];
            drivers[item.driver].push(marker);
            allMarkers.push(marker);
            resolve();
          });
        });
      }

      const btnWrap = document.getElementById('toggle-btns');
      const driverLegend = document.getElementById('driver-legend');

      const allBtn = document.createElement('button');
      allBtn.className = 'toggle-btn';
      allBtn.style.cssText = 'background:#333;color:white;border-color:#333;';
      allBtn.textContent = '전체 보기';
      allBtn.onclick = () => {
        allMarkers.forEach(m => m.setVisible(true));
        document.querySelectorAll('.driver-btn').forEach(b => b.style.opacity = '1');
      };
      btnWrap.appendChild(allBtn);

      Object.keys(drivers).forEach(d => {
        const c = getColor(d);
        const btn = document.createElement('button');
        btn.className = 'toggle-btn driver-btn';
        btn.style.cssText = `background:${c};color:white;border-color:${c};`;
        btn.textContent = d || '미배정';
        btn.onclick = () => {
          const visible = btn.style.opacity !== '0.4';
          drivers[d].forEach(m => m.setVisible(!visible));
          btn.style.opacity = visible ? '0.4' : '1';
        };
        btnWrap.appendChild(btn);

        const legendItem = document.createElement('div');
        legendItem.className = 'legend-item';
        legendItem.innerHTML = `<div class="dot" style="background:${c}"></div>${d || '미배정'}`;
        driverLegend.appendChild(legendItem);
      });
    }

    initMap();
  </script>
</body>
</html>
